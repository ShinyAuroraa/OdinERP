# ============================================================
# TEMPLATE — Do NOT commit real secret values.
# Create this secret manually before deploying:
#
#   kubectl create secret generic wms-web-secrets \
#     --from-literal=NEXTAUTH_SECRET="$(openssl rand -base64 32)" \
#     --namespace=wms
#
# Or apply with real values locally (never in CI):
#   kubectl apply -f secret.yaml  # after filling in values
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: wms-web-secrets
  namespace: wms
  labels:
    app: wms-web
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  NEXTAUTH_SECRET: "REPLACE_ME_BEFORE_APPLYING"
