apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wms-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: odin-erp

  source:
    repoURL: https://github.com/odin-erp/odin
    targetRevision: main
    path: services/wms-service/k8s/wms

  destination:
    server: https://kubernetes.default.svc
    namespace: odin

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5
