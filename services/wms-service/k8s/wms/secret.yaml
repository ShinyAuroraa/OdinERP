# IMPORTANT: Este arquivo contém apenas referências de estrutura.
# Os valores reais são gerenciados via Vault/External Secrets Operator.
# NUNCA commitar valores reais de secrets neste arquivo.
apiVersion: v1
kind: Secret
metadata:
  name: wms-service-secret
  namespace: odin
  annotations:
    # External Secrets Operator: sincroniza do Vault
    external-secrets.io/vault-path: "secret/odin/wms"
type: Opaque
stringData:
  DB_URL: "MANAGED_BY_VAULT"
  DB_USER: "MANAGED_BY_VAULT"
  DB_PASSWORD: "MANAGED_BY_VAULT"
  REDIS_URL: "MANAGED_BY_VAULT"
  ES_URL: "MANAGED_BY_VAULT"
