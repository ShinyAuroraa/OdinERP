apiVersion: v1
kind: ConfigMap
metadata:
  name: wms-service-config
  namespace: odin
data:
  SPRING_PROFILES_ACTIVE: "staging"
  SERVER_PORT: "8080"
  MANAGEMENT_PORT: "8081"
  APP_NAME: "wms-service"
  KEYCLOAK_JWK_URI: "http://keycloak:8090/realms/odin/protocol/openid-connect/certs"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  JAEGER_OTLP_ENDPOINT: "http://jaeger-collector:4318/v1/traces"
  TRACING_SAMPLING_PROBABILITY: "0.1"
