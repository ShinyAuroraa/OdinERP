apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wms-service-hpa
  namespace: odin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wms-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
