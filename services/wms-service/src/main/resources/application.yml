spring:
  application:
    name: wms-service

  # PostgreSQL + JPA + Flyway
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wms_db}
    username: ${DB_USER:wms_user}
    password: ${DB_PASSWORD:wms_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: WmsHikariPool
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # Redis
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 1000ms

  # Elasticsearch
  elasticsearch:
    uris: ${ES_URL:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 30s

  # Keycloak OAuth2 Resource Server — JWK URI para validação de tokens JWT
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8090/realms/odin/protocol/openid-connect/certs}

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: wms-receiving
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.odin.wms.infrastructure.kafka.event,com.odin.wms.messaging.event"
        spring.json.use.type.headers: "false"
        spring.json.value.default.type: "com.odin.wms.infrastructure.kafka.event.PurchaseOrderConfirmedEvent"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Graceful shutdown
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    context-path: /api/v1/wms
  tomcat:
    threads:
      max: 200
      min-spare: 10

# Actuator / Health checks
management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,flyway
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    redis:
      enabled: true
    elasticsearch:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:default}
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${JAEGER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

info:
  app:
    name: ${spring.application.name}
    version: '@project.version@'
    description: Odin ERP - Warehouse Management System

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

wms:
  cache:
    stock-balance:
      ttl-minutes: ${WMS_CACHE_STOCK_BALANCE_TTL_MINUTES:5}
  gs1:
    company-prefix: ${WMS_GS1_COMPANY_PREFIX:0789123}
  traceability:
    max-movements: ${WMS_TRACEABILITY_MAX_MOVEMENTS:500}
  kafka:
    topics:
      crm-orders-confirmed: ${WMS_KAFKA_TOPIC_CRM_ORDERS:crm.orders.confirmed}
      picking-completed: ${WMS_KAFKA_TOPIC_PICKING_COMPLETED:wms.picking.completed}
      packing-completed: ${WMS_KAFKA_TOPIC_PACKING_COMPLETED:wms.packing.completed}

logging:
  level:
    root: INFO
    com.odin.wms: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] [%X{tenantId:-}] %logger{36} - %msg%n'
