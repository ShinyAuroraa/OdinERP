spring:
  # Kafka — listener desabilitado por padrão nos testes; apenas ReceivingNoteKafkaConsumerTest
  # usa @EmbeddedKafka e habilita explicitamente com spring.kafka.listener.auto-startup=true
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    listener:
      auto-startup: false
    consumer:
      properties:
        spring.json.trusted.packages: "com.odin.wms.infrastructure.kafka.event"
        spring.json.use.type.headers: "false"
        spring.json.value.default.type: "com.odin.wms.infrastructure.kafka.event.PurchaseOrderConfirmedEvent"

  # OAuth2 Resource Server — URI nunca é chamada em testes (jwt() post-processor bypassa o JwtDecoder)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/realms/odin/protocol/openid-connect/certs

  jpa:
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

# Management: random port to avoid conflicts; expose all endpoints for test assertions
management:
  server:
    port: 0
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  # Spring Boot 3.x disables metrics export in tests by default; enable prometheus explicitly
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: WARN
    com.odin.wms: INFO
    org.testcontainers: INFO
