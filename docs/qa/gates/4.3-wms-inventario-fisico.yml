    status: CONCERNS
    notes: "JOIN FETCH + Pageable pode causar paginação in-memory em armazéns grandes (PERF-001)."

  security:
    status: PASS
    notes: "Isolamento multi-tenant completo. RBAC declarativo correto. Input validation presente."

  reliability:
