# ─── Risk Assessment ──────────────────────────────────────────────────────────
risk_matrix:
  - risk: "Paginação in-memory em inventários de armazéns grandes"
    probability: medium
    impact: medium
    score: medium
    mitigation: "PERF-001 — usar two-query pattern antes de MVP com armazéns reais"

  - risk: "HTTP 500 em conflito de concorrência (deveria ser 409)"
    probability: low
    impact: medium
    score: medium
    mitigation: "REL-001 — adicionar @ExceptionHandler para ObjectOptimisticLockingFailureException"

  - risk: "Cache eviction excessiva em multi-tenant"
    probability: low
    impact: low
    score: low
    mitigation: "MNT-001 — evict scoped por locationId em sprint futuro"

  - risk: "Fidelidade reduzida do teste de reconciliação"
    probability: low
    impact: low
    score: low
    mitigation: "TEST-001 — refatorar para usar endpoint PATCH diretamente"

# ─── Gate Decision ────────────────────────────────────────────────────────────
gate_decision:
  verdict: CONCERNS
  rationale: |
    Story 4.3 implementa um workflow de inventário físico completo e complexo com qualidade
    técnica satisfatória. Todos os 11 ACs verificados. 8 testes unitários + 8 integração
    passando. BUILD SUCCESS com JaCoCo ≥ 80% confirmado (236 testes, 0 falhas).

    CONCERN-1 de Story 4.2 (submitCount_withNonWmsRole_returns403) explicitamente endereçado
    e testado com ROLE_FINANCE → 403. ✅ Tech debt fechado formalmente.

    Issues encontrados:
    - 2 × MEDIUM (não bloqueantes): PERF-001 (JOIN FETCH + Pageable), REL-001 (optimistic lock → 500)
    - 2 × LOW (não bloqueantes): MNT-001 (evictAll broad), TEST-001 (DB manipulation em teste)

    Nenhum issue é bloqueante para merge. PERF-001 e REL-001 devem ser agendados para
    sprint pré-MVP antes de produção com armazéns reais. A funcionalidade core está correta
    e o risco de produção imediato é baixo dado o contexto de desenvolvimento.

    Aprovado com concerns. Story pode prosseguir para merge do PR #5.

  approved: true
  proceed_to: "@devops (Gage) — merge PR #5 (feature/4.3-wms-inventario-fisico)"
  tech_debt_created:
    - PERF-001  # Two-query pattern para findByInventoryCountIdWithDetails — pré-MVP
    - REL-001   # GlobalExceptionHandler para ObjectOptimisticLockingFailureException → 409
    - MNT-001   # Cache eviction scoped por tenant+location
    - TEST-001  # Refatorar reconcile integration test para usar API endpoint
  tech_debt_closed:
    - "CONCERN-1 de Story 4.2 — submitCount_withNonWmsRole_returns403 implementado e testado ✅"
