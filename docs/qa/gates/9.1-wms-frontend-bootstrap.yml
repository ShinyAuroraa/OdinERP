## Issues Found

issues:
  - id: QA-9.1-001
    severity: low
    category: security
    description: |
      Cookies wms-auth-token e x-tenant-id são definidos via document.cookie (client-side),
      portanto NÃO são httpOnly. O token JWT é JavaScript-readable no cookie.
      O token está primariamente em React state (memória) — AC2 atendido.
      O cookie serve apenas de transport para o middleware Next.js.
    recommendation: |
      Para produção, considerar Route Handler (/api/auth/token) que seta cookie httpOnly
      server-side após receber o token do client. Isso elimina o risco residual.
      Candidato para tech debt em Story 9.2+ ou story de segurança dedicada.
    blocked: false
    waived: false

  - id: QA-9.1-002
    severity: low
    category: tests
    description: |
      Testes e2e (Playwright) requerem servidor Next.js em execução + instância Keycloak.
      Em CI/CD sem Keycloak, os testes e2e vão falhar na etapa de redirect para Keycloak.
      Os 4 cenários testam comportamento com mock de cookies direto (não fluxo Keycloak completo).
    recommendation: |
      Configurar mock de Keycloak (keycloak-mock ou Testcontainers Keycloak) em CI.
      Alternativa: marcar testes e2e como @skip em ambientes sem Keycloak.
      Story 9.2+ pode adicionar setup de Keycloak para testes de integração.
    blocked: false
    waived: true
    waiver_reason: "MVP — Keycloak mock em CI é escopo de story de infrastructure/DevOps"

