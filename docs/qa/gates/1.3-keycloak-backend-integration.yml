  - id: 'MNT-001'
    severity: low
    finding: >
      Unchecked cast (List<String>) in KeycloakJwtAuthenticationConverter.extractRoles() —
      ClassCastException possible if JWT realm_access.roles is not a List. Risk is low because
      JWT is validated via Keycloak JWKS before reaching this code.
    suggested_action: >
      Consider adding a defensive try-catch or instanceof check in a future refactoring story.
      Not blocking for current scope.
  - id: 'TEST-001'
    severity: low
    finding: >
      actuatorHealth_withoutToken_isPublic() test expects 404 (not 200 as stated in AC6) due to
      @WebMvcTest not loading actuator endpoints. The 404 correctly confirms permitAll() is active
      (security did not block at 401). Full actuator 200 coverage provided by CrmApplicationSmokeTest.
    suggested_action: >
      No action needed. Known @WebMvcTest limitation is documented with a clear comment in the test.
      AC6 coverage is complete across CrmApplicationSmokeTest + SecurityMvcTest combined.
  - id: 'MNT-002'
    severity: low
    finding: >
      Collectors.toList() used in MeController — Stream.toList() (available in Java 16+, Java 21 in use)
      is more idiomatic and returns an unmodifiable list.
    suggested_action: >
      Cosmetic refactoring, optional. Can be addressed as part of any future controller update.

