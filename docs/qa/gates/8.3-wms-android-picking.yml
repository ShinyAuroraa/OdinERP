top_issues:
  - id: QA-8.3-001
    severity: medium
    category: code
    finding: >
      QA-8.2-003 pattern persists at ViewModel layer. Both PickingViewModel.loadTasks()
      and loadTasksOfflineAware() emit TasksLoaded(emptyList(), isOffline=true) when
      repository returns ApiResult.NetworkError. The repository correctly queries Room
      and returns real data, but the ViewModel discards it — the cached tasks list
      never reaches the UI. Same gap exists in ShippingViewModel.loadOrders():
      emits OrdersLoaded(emptyList(), isOffline=true). AC1 requires "lista vem do Room
      picking_tasks_cache" and AC6 requires "lista vem do Room shipping_orders_cache"
      when offline; offline banner shows but list is empty.
      Files: PickingViewModel.kt lines 68-70, 89-90; ShippingViewModel.kt lines 43-44.
    recommendation: >
      IPickingRepository.getTasks() and IShippingRepository.getOrders() should return
      ApiResult.Success(cachedData, isOffline=true) instead of ApiResult.NetworkError
      so the ViewModel can pass the cached list to TasksLoaded/OrdersLoaded. Alternatively,
      the ViewModel NetworkError branch should call a dedicated getCachedTasks()/getCachedOrders()
      on the repository to retrieve the list. Address in Story 8.4 or micro-task.

  - id: QA-8.3-002
    severity: low
    category: code
    finding: >
      PickingSyncWorker.doWork() returns Result.retry() when hasFailure=true (line 86).
      The manual retry logic via retryCount (max 3) is already implemented correctly,
      but returning Result.retry() also activates WorkManager's built-in exponential
      backoff scheduling, causing items to be retried both by the manual counter AND
      by WorkManager re-enqueuing the worker. In practice this may cause more retry
      attempts than the documented 3-retry limit. AC8 specifies "backoff exponencial
      (máx. 3 tentativas)" managed manually.
    recommendation: >
      Change the final return to Result.success() unconditionally, since retry
      scheduling is managed internally via retryCount and PickingSyncWorker is
      already enqueued on-demand when connectivity is restored. Document the
      WorkManager retry semantics decision. Low risk in practice since the manual
      SYNC_FAILED transition acts as a circuit breaker.

observations:
  - "Clean Architecture strictly respected: domain/ contains zero Android SDK imports. IPickingRepository and IShippingRepository interfaces use only Kotlin primitives (String, Int, Double?) — no DTOs in domain layer. ConfirmPickItemRequestDto and LoadPackageRequestDto are constructed internally in PickingRepository and ShippingRepository respectively."
  - "QA-8.2-004 fix confirmed: PickingSyncWorker companion object uses 'private val NOTIFICATION_ID = AtomicInteger(2000)' — correct and thread-safe."
  - "QA-8.2-003 fix confirmed at repository level: loadTasksFromCache() queries pickingTaskDao.getByTenantId(tenantId) and loadOrdersFromCache() queries shippingOrderDao.getByTenantId(tenantId). The fix is architecturally correct but ViewModel does not propagate the data (see QA-8.3-001)."
  - "Room MIGRATION_2_3 is complete and correct: all 5 tables (picking_tasks_cache, picking_items_cache, picking_sync_queue, shipping_orders_cache, shipping_packages_cache) created with CREATE TABLE IF NOT EXISTS. FEFO index idx_picking_items_expiry on (product_code, expiry_date) present. MIGRATION_1_2 preserved in addMigrations()."
  - "OperationsScreen.kt confirmed untouched — Picking and Expedição navigation wired correctly in WmsNavGraph.kt via onOperationClick handler. Navigation covers all 7 picking routes and 3 shipping routes."
  - "FEFO check in PickingViewModel.confirmItemPicked() is correctly non-blocking: FEFOWarning state is emitted then execution falls through to call confirmItemPicked on repository. Botão 'Confirmar Pick' remains enabled per AC4."
  - "PickingItemDao.getPendingByProductSortedByExpiry() uses correct FEFO ordering: CASE WHEN expiry_date IS NULL THEN 1 ELSE 0 END ASC, expiry_date ASC — matches story spec exactly."
  - "ShippingViewModel correctly avoids importing LoadPackageRequestDto — primitives (orderId, packageId, trackingCode, vehiclePlate) passed directly to IShippingRepository.loadPackage()."
  - "vehiclePlate nullable throughout the entire chain: ShippingOrderCacheEntity (String?), ShippingOrder domain model (String?), ShippingViewModel.loadPackage(vehiclePlate: String?). No NullPointerException risk."
  - "Hilt DI scopes correct: PickingModule @InstallIn(SingletonComponent::class) with @Binds @Singleton. DatabaseModule provides all 5 new DAOs. PickingViewModel and ShippingViewModel use @HiltViewModel and @Inject."
  - "Unit tests U2–U13 present and well-structured with JUnit 5 + MockK + StandardTestDispatcher. Setup/teardown properly set and reset Main dispatcher. U5 FEFO warning test uses flexible assertion (FEFOWarning || ConfirmSuccess) which correctly handles the state overwrite pattern."
  - "PickingSyncWorker processes queue in FIFO order (getPendingByTenant orders by created_at ASC). SyncOutcome enum cleanly maps all 4 outcomes (SUCCESS, CONFLICT, RETRY, PERMANENT_ERROR)."
  - "Worker tag 'picking_sync' distinct from 'receiving_sync' (Story 8.2) and 'general_sync' (Story 8.1) — correct isolation."
  - "ProGuard note: Gson DTOs (ConfirmPickItemRequestDto, LoadPackageRequestDto) serialized at runtime — no proguard-rules.pro verification performed. Same open concern from Story 8.2 (QA-8.2 observation)."

tech_debt:
  - id: QA-8.3-TD-001
    description: >
      PickingViewModel and ShippingViewModel discard cached data on NetworkError,
      emitting empty list in offline mode. Repository layer reads Room correctly
      but ViewModel does not propagate data. Offline list is empty despite cache
      having data. Fix: return ApiResult.Success with isOffline=true flag from
      repository, or add dedicated getCachedTasks/getCachedOrders calls in ViewModel.
    priority: medium

  - id: QA-8.3-TD-002
    description: >
      PickingSyncWorker returns Result.retry() in addition to manual retryCount
      management, causing WorkManager to also schedule exponential backoff retries
      independently of the 3-retry limit. Return Result.success() and rely solely
      on the manual retry mechanism with on-demand enqueue.
    priority: low

  - id: QA-8.3-TD-003
    description: >
      getTaskDetail() and getOrderDetail() offline fallback returns ApiResult.NetworkError
      without the cached task/order data embedded, causing the ViewModel to emit
      Error("Offline — dados podem estar desatualizados") instead of an offline-aware
      TaskDetail/OrderDetail state. AC2 and AC7 require detail screens to function
      offline using Room data.
    priority: medium

  - id: QA-8.3-TD-004
    description: >
      ProGuard rules for Gson-serialized DTOs (ConfirmPickItemRequestDto,
      LoadPackageRequestDto, PickingItemDto, ShippingOrderDto, etc.) have not been
      verified. Release builds may break serialization without explicit keep rules.
      Inherited open item from Story 8.2.
    priority: low
