# ─── Issues Found ─────────────────────────────────────────────────────────────
issues:
  - id: QA-1.1-001
    severity: medium
    category: code
    file: "services/wms-service/src/main/java/com/odin/wms/config/ElasticsearchConfig.java"
    lines: "16-17"
    description: |
      URI parsing via String.replace() é frágil. O código usa:
        .replace("http://", "").replace("https://", "")
      para extrair host:port. Esta abordagem falha com URIs que contêm credenciais
      (ex: http://user:pass@host:9200) ou múltiplos hosts. Em produção, o ES_URL
      pode evoluir para incluir autenticação básica ou clusters multi-node.
    recommendation: |
      Substituir por parsing via java.net.URI:
        URI uri = URI.create(esUrl);
        String hostAndPort = uri.getHost() + ":" + uri.getPort();
      Ou usar HttpHost.create(esUrl) do cliente ES para suporte nativo.
    blocking: false
    suggested_story: "1.4 (observability) ou como fix em 1.3 quando ES for configurado com auth"

  - id: QA-1.1-002
    severity: medium
    category: security
    file: "services/wms-service/src/main/java/com/odin/wms/config/RedisConfig.java"
    lines: "25-29"
    description: |
      LaissezFaireSubTypeValidator desabilita validação de tipo polimórfico do Jackson,
      tornando a desserialização potencialmente vulnerável a ataques de gadget chain
      (CVE-2017-7525 e similares). Para uso como cache Redis com dados controlados
      internamente o risco é baixo, mas o padrão deve ser evitado.
    recommendation: |
      Substituir por BasicPolymorphicTypeValidator com allowlist explícita:
        PolymorphicTypeValidator ptv = BasicPolymorphicTypeValidator.builder()
            .allowIfBaseType(Object.class)
            .allowIfSubType("com.odin.wms.")
            .build();
        mapper.activateDefaultTyping(ptv, DefaultTyping.NON_FINAL, As.PROPERTY);
      Ou preferir tipagem explícita nos beans ao invés de DefaultTyping genérico.
    blocking: false
    suggested_story: "Registrar como tech debt — corrigir quando modelo de domínio estiver definido (Story 1.2+)"

  - id: QA-1.1-003
    severity: low
    category: security
    file: "services/wms-service/.github/workflows/wms-ci.yml"
    lines: "116"
    description: |
      `uses: aquasecurity/trivy-action@master` usa a branch master da action, sem
      pin de versão ou SHA. Supply chain risk: uma mudança maliciosa no repositório
      upstream afetaria imediatamente todos os builds.
    recommendation: |
      Fixar em versão específica com SHA:
        uses: aquasecurity/trivy-action@0.28.0  # ou pin de SHA
    blocking: false
    suggested_story: "Corrigir em qualquer story subsequente que toque no pipeline CI"

  - id: QA-1.1-004
    severity: low
    category: code
    file: "services/wms-service/src/main/java/com/odin/wms/config/SecurityConfig.java"
    lines: "29-33"
    description: |
      anyRequest().permitAll() é intencional e devidamente documentado com Javadoc
      referenciando Story 1.3. Registrado como dívida técnica explícita.
    recommendation: "Implementar Keycloak OAuth2/OIDC conforme planejado na Story 1.3."
    blocking: false
    suggested_story: "1.3 — WMS Auth & RBAC Keycloak (já planejado)"

# ─── Quality Checks Summary ───────────────────────────────────────────────────
quality_checks:
  code_review:
    status: PASS_WITH_CONCERNS
    notes: |
      Padrões gerais sólidos: Spring Boot 3 idiomático, ProblemDetail RFC 7807,
      graceful shutdown, JPA open-in-view desabilitado, ddl-auto: validate correto.
      2 issues medium identificados (ElasticsearchConfig URI e RedisConfig DefaultTyping).

  unit_tests:
    status: PASS
    notes: |
      Story de bootstrap — lógica de negócio inexistente, portanto ausência de unit
      tests é esperada e correta. 12 testes de integração cobrem todos os caminhos
      relevantes: context load, health checks, Redis R/W, ES connectivity.

  acceptance_criteria:
    status: PASS
    notes: "Todos os 10 ACs verificados como implementados."

  no_regressions:
    status: N_A
    notes: "Projeto greenfield — não há código preexistente."

  performance:
    status: PASS
    notes: |
      HikariCP max-pool-size 20, Redis lettuce pool, K8s resources requests/limits
      adequados para bootstrap. JVM flags UseContainerSupport + MaxRAMPercentage=75
      são boas práticas para containers.

  security:
    status: PASS_WITH_CONCERNS
    notes: |
      Positivos: non-root user (UID 1001), K8s runAsNonRoot, Trivy CRITICAL/HIGH scan,
      secrets via K8s Secrets anotados para Vault/ESO, STATELESS session, CSRF disabled.
      Concerns: LaissezFaireSubTypeValidator (QA-1.1-002), trivy-action@master sem pin (QA-1.1-003).

  documentation:
    status: PASS
    notes: |
      README-WMS.md completo: pré-requisitos, variáveis de ambiente, rodando local,
      testes, health checks, build Docker, deploy K8s. SecurityConfig com Javadoc
      explicando temporariedade. V1__init.sql com comentários de contexto.

