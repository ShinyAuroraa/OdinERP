# ─── Risk Assessment ──────────────────────────────────────────────────────────
risk_matrix:
  - risk: "Cache key pattern diverge da spec — pode causar confusão em debugging"
    probability: low
    impact: low
    score: low
    mitigation: "CONCERN-1 — atualizar spec na próxima revisão"

  - risk: "allEntries=true causa thundering herd em eviction"
    probability: medium
    impact: medium
    score: medium
    mitigation: "CONCERN-2 — TTL curto (5min) mitiga; decisão aceita por @po"

  - risk: "Concorrência real não testada via integração (apenas via GlobalExceptionHandler)"
    probability: low
    impact: medium
    score: low
    mitigation: "CONCERN-3 — adicionar teste de concorrência em Story 4.2"

  - risk: "Cobertura incompleta de RBAC (403, WMS_SUPERVISOR não testados)"
    probability: low
    impact: low
    score: low
    mitigation: "CONCERN-4 — adicionar em Story 4.2"

# ─── Gate Decision ────────────────────────────────────────────────────────────
gate_decision:
  verdict: PASS
  rationale: |
    Story 4.1 implementa corretamente todos os 12 Acceptance Criteria.
    198/198 testes passando, BUILD SUCCESS verificado via ./mvnw verify.

    A implementação demonstra qualidade técnica elevada: JPQL com JOIN FETCH
    previne N+1, StockCacheConfig com CachingConfigurer implementa degradação
    graciosa corretamente, tenant isolation completo em todas as queries.

    Os 4 concerns são documentados mas não bloqueantes:
    - 3 de severidade LOW (cosmético, aceito por @po, cobertura de edge cases)
    - 1 de severidade MEDIUM (CONCERN-3): AC7 usa GlobalExceptionHandler ao invés
      de captura nos services — comportamento externo idêntico, abordagem DRY
      mais correta. Spec deve ser atualizada em 4.2.

    Story aprovada para push e criação de PR via @devops.

  approved: true
  proceed_to: "@devops (Gage) — git push e PR creation"
  tech_debt_created:
    - CONCERN-3  # Atualizar spec AC7 em Story 4.2
    - CONCERN-4  # Adicionar testes WMS_SUPERVISOR e 403 em Story 4.2
