status_reason: >
  All 6 acceptance criteria are met. pnpm lint, pnpm type-check, and pnpm build
  all pass. NextAuth v5 + Keycloak OIDC flow, Edge Runtime middleware, silent
  refresh, SSO logout, SessionProvider, useCurrentUser hook, and pt-BR login page
  are correctly implemented. Four low-severity observations documented — none blocking.
reviewer: 'Quinn'
updated: '2026-02-22T00:00:00Z'
top_issues:
  - id: 'SEC-001'
    severity: low
    finding: >
      No rate limiting on NextAuth /api/auth/* endpoints. The middleware.ts
      matcher explicitly excludes the /api path, leaving auth endpoints exposed
      to unrestricted request volume. In local dev this is acceptable, but a
      brute-force or token-stuffing attack against /api/auth/callback/keycloak
      would succeed without server-side throttling.
    suggested_action: >
      Before production: add rate limiting middleware or configure Keycloak
      realm-level brute-force protection (Account Lockout policy). Alternatively,
      add /api/auth/* to the middleware matcher with a rate-limit check. Defer
      to a dedicated security hardening story.
  - id: 'MNT-001'
    severity: low
    finding: >
      app/layout.tsx sets lang="en" on the <html> element but the entire
      application UI is in pt-BR (login page, topbar, error messages). Incorrect
      lang attribute affects screen reader pronunciation, browser spell-check
      language, and SEO language signals.
    suggested_action: >
      Change <html lang="en"> to <html lang="pt-BR"> in app/layout.tsx. Low
      effort, high accessibility correctness value. Can be fixed in any story
      or alongside the next UI work.
  - id: 'MNT-002'
    severity: low
    finding: >
      useCurrentUser() exposes hasError: true when the JWT refresh token fails
      (RefreshAccessTokenError) but no component currently reacts to this flag.
      An authenticated user with an expired refresh token will remain on /dashboard
      seeing "..." or "Usuário" in the Topbar without being redirected to /login.
      The middleware does not re-check session error state on subsequent navigations.
    suggested_action: >
      Add an effect in Topbar.tsx (or a dedicated AuthGuard client component)
      that calls signOut() when hasError is true. Example:
      useEffect(() => { if (hasError) { void signOut({ callbackUrl: '/login' }); } }, [hasError]);
      This closes the gap between session error propagation and user redirect.
  - id: 'TEST-001'
    severity: low
    finding: >
      useCurrentUser() hook has no unit tests. The hook is central to auth UX
      on every authenticated page (name display, role-gating readiness, error
      detection). The story marks unit tests as optional, but the hook behavior
      (name/email/roles/isLoading/hasError) is straightforward to test with a
      mocked useSession.
    suggested_action: >
      Add lib/hooks/use-current-user.test.ts with Vitest + @testing-library/react
      mocking useSession. Cover: (1) loading state, (2) authenticated with roles,
      (3) error state (hasError: true). Defer to a dedicated testing sprint or
      include in Story 1.6+ when test infrastructure is confirmed.

