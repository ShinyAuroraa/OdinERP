    severity: medium
    category: requirements
    description: >
      AC8 gap: signatureBase64 in ReceivingSyncQueueEntity stored as plain String.
      AC8 specifies AES-256 encryption for signature at rest in Room.
    file: "apps/wms-android/app/src/main/java/com/odin/wms/android/data/local/entity/ReceivingSyncQueueEntity.kt"
    line: 28
    recommendation: "Implement AES-256 encryption for signatureBase64 field before production"
    priority: "pre-production"

  - id: "QA-8.2-002"
    severity: medium
    category: requirements
    description: >
      AC5 deviation: DivergenceScreen uses ActivityResultContracts.TakePicture
      (implicit intent) instead of CameraX ImageCapture use case as specified in
      story Dev Notes. CameraX lifecycle isolation from BarcodeAnalyzer not validated.
    file: "apps/wms-android/app/src/main/java/com/odin/wms/android/ui/receiving/DivergenceScreen.kt"
    line: 78
    recommendation: "Migrate to CameraX ImageCapture in Story 8.3 refactor or dedicated story"
    priority: "next-story"

  - id: "QA-8.2-003"
    severity: low
    category: code
    description: >
      loadOrdersFromCache() in ReceivingViewModel returns empty orders list instead
      of reading Room cache data. Offline UX partially degraded (banner shown but
      orders not displayed from cache).
    file: "apps/wms-android/app/src/main/java/com/odin/wms/android/ui/receiving/ReceivingViewModel.kt"
    line: 80
    recommendation: "Add IReceivingRepository.getCachedOrders() and call from loadOrdersFromCache()"
    priority: "next-story"

  - id: "QA-8.2-004"
    severity: low
    category: code
    description: >
      NOTIFICATION_ID in ReceivingSyncWorker is a mutable var on companion object.
      Not atomic — potential duplicate IDs in concurrent contexts.
    file: "apps/wms-android/app/src/main/java/com/odin/wms/android/work/ReceivingSyncWorker.kt"
    line: 170
    recommendation: "Use AtomicInteger for NOTIFICATION_ID"
    priority: "low-priority"

waiver:
  active: false

coderabbit_predicted_vs_actual:
  - area: "Memory Leaks — CameraX + Compose"
    predicted: CRITICAL
    actual: "NOT_FOUND — BarcodeAnalyzer uses DisposableEffect (Story 8.1 pattern). DivergenceScreen uses TakePicture intent (no CameraX lifecycle to manage there). No leak risk found."
  - area: "Room Migration"
    predicted: CRITICAL
    actual: "PASS — MIGRATION_1_2 creates all 3 tables with correct DDL. CREATE TABLE IF NOT EXISTS used. Index created separately."
  - area: "Coroutine Context"
    predicted: HIGH
    actual: "PASS — withContext(Dispatchers.IO) used in Repository and Worker. viewModelScope.launch correct. CancellationException not suppressed."
  - area: "Offline Queue Integrity"
    predicted: HIGH
    actual: "PARTIAL — insertAndReturnId() with @Transaction exists in DAO, but main insert() call in Repository uses non-transactional insert(). Atomic insert+updateStatus pattern not used for queue operations. Low practical risk."
  - area: "Base64 Photo Encoding"
    predicted: HIGH
    actual: "PASS — Photos compressed to 512px/60% JPEG before Base64 encoding. OOM risk mitigated."
  - area: "Hilt Scope"
    predicted: MEDIUM
    actual: "PASS — ReceivingModule is SingletonComponent, DAOs provided via DatabaseModule."
  - area: "GS1 Regex Edge Cases"
    predicted: MEDIUM
    actual: "PASS — day=00 handled (→1), blank/empty handled, SSCC detected. Test coverage for main cases present."
  - area: "ProGuard — Gson/Moshi"
    predicted: MEDIUM
    actual: "NOT_VERIFIED — No proguard-rules.pro inspection performed. Gson DTOs (ReceivingItemDto, ConfirmItemRequestDto, etc.) may require ProGuard keep rules for release builds."
