top_issues:
  - id: QA-8.4-001
    severity: low
    category: code
    finding: >
      InventoryViewModel.loadSessions() handles ApiResult.NetworkError by making a
      second call to inventoryRepository.getSessions(tenantId) inside the NetworkError
      branch (lines 54-56). When the device is genuinely offline, this second call
      also returns ApiResult.NetworkError, and the fallback path returns emptyList()
      (line 55 catch / NetworkError inner branch). This means the sessions list is
      empty in the offline banner state for the session list screen, despite Room cache
      potentially having data. The counting list offline path (QA-8.3-001 target) is
      correctly fixed via getCountingListFromCache(). This is a separate lower-severity
      gap specific to the sessions screen offline UX.
    recommendation: >
      Add IInventoryRepository.getSessionsFromCache(tenantId: String): List<InventorySession>
      (analogous to getCountingListFromCache) and call it in the ViewModel NetworkError
      branch instead of the recursive getSessions() call. Alternatively, refactor
      getSessions() to return ApiResult.Success(cachedData, isOffline=true) on network
      failure — consistent with the pattern applied to getCountingList(). Low priority
      since the offline banner is displayed and the counting flow works correctly;
      address in a micro-task or future story.

  - id: QA-8.4-002
    severity: low
    category: code
    finding: >
      InventorySyncWorker.doWork() returns Result.retry() when hasFailure=true (line 91),
      identical to the double-retry pattern flagged as QA-8.3-TD-002 in Story 8.3.
      The manual retry via retryCount (MAX_RETRIES=3) is correctly implemented, but
      returning Result.retry() also activates WorkManager's built-in exponential backoff,
      causing items to be scheduled for retry by both the manual counter and WorkManager
      independently. In practice the SYNC_FAILED circuit breaker limits damage, but
      retry semantics are not as documented.
    recommendation: >
      Same recommendation as QA-8.3-TD-002: return Result.success() unconditionally
      and rely solely on the manual retryCount mechanism with on-demand enqueue when
      connectivity is restored. This is an inherited pattern from PickingSyncWorker.

fix_confirmations:
  QA-8.3-001: >
    RESOLVED — Full end-to-end fix confirmed. (1) IInventoryRepository interface exposes
    getCountingListFromCache(sessionId: String): List<InventoryItem> at line 11.
    (2) InventoryRepository.getCountingListFromCache() queries inventoryItemDao.getBySessionId(sessionId)
    and maps to domain objects — never returns emptyList() (lines 170-174).
    (3) InventoryRepository.getCountingList() calls getCountingListFromCache() on both
    non-2xx HTTP responses and IOException — result encoded in ApiResult.NetworkError message
    as "offline:N" where N is count of cached items (lines 154-156, 159-163).
    (4) InventoryViewModel.loadCountingList() NetworkError branch explicitly calls
    inventoryRepository.getCountingListFromCache(sessionId) and emits
    CountingListLoaded(cachedItems, sessionId, isOffline=true) — data reaches the UI
    (lines 80-81). Test U11 in InventoryRepositoryTest verifies getCountingListFromCache()
    returns 1 real item from Room. The fix is architecturally correct and complete.
  QA-8.2-004_preventive: >
    CONFIRMED — InventorySyncWorker companion object declares
    'private val NOTIFICATION_ID = AtomicInteger(3000)' at line 193.
    Value 3000 is distinct from PickingSyncWorker (2000) and ReceivingSyncWorker.
    AtomicInteger.getAndIncrement() called in notifyUser() at line 180 — thread-safe.

observations:
  - "OperationsScreen.kt confirmed NOT modified in commit c9800d5. Navigation to Inventário and Transferências wired exclusively in WmsNavGraph.kt via onOperationClick handler (lines 204-205)."
  - "MIGRATION_3_4 creates 4 tables and 3 indexes (not 2 as in Dev Notes). The implementation correctly adds CREATE UNIQUE INDEX IF NOT EXISTS idx_inv_sessions_tenant_number ON inventory_sessions_cache(tenant_id, session_number) — this matches the @Entity(indices = [Index(value = [tenant_id, session_number], unique = true)]) definition on InventorySessionCacheEntity. The extra index is architecturally correct."
  - "addMigrations(MIGRATION_1_2, MIGRATION_2_3, MIGRATION_3_4) confirmed in DatabaseModule.kt line 35. All 3 legacy migrations preserved."
  - "All 4 new DAOs registered in DatabaseModule: provideInventorySessionDao, provideInventoryItemDao, provideInventorySyncQueueDao, provideTransferDao (lines 69-78)."
  - "InventoryItemCacheEntity.toDomain() implements a safe status mapping with uppercase() + fallback to PENDING for unknown values — robust against server adding new statuses."
  - "InventoryRepository.doubleCount() validates firstCounterId locally before calling API: if cachedItem.firstCounterId == counterId, returns ApiResult.Error immediately without network call. Prevents same-operator double count even when offline."
  - "InventoryRepository.countItem() stores firstCounterId in Room for both online (line 197) and offline paths (line 217) — double-count validation is not bypassable by enqueuing offline."
  - "InventoryItemDao.getBySessionAndAisle() uses LIKE :aisle || '%' for prefix match — correct SQLite approach for corridor filtering."
  - "SyncOutcome enum in InventorySyncWorker cleanly separates IDEMPOTENT (409) from CONFLICT (404) — architecturally clean and correct."
  - "Unit test U10 in InventorySyncWorkerTest specifically tests TRANSFER 409 → SYNCED idempotency path. Test mocks apiService.createTransfer() to return 409, verifies updateStatus(1L, SYNCED) called."
  - "Domain models (InventorySession, InventoryItem, Transfer) contain no Android SDK imports — Clean Architecture strictly respected."
  - "IInventoryRepository and ITransferRepository use only Kotlin primitives (String, Int?, String?) — no DTOs in domain layer."
  - "7 new WmsScreen route objects added for Inventory and Transfer flows. All composable registrations complete including argument declarations (NavType.StringType for sessionId, itemId)."
  - "Transfer confirm flow uses savedStateHandle correctly to pass data between TransferCreateScreen and transfer_confirm_screen composable."
  - "Story test coverage: 12 unit tests (U1-U12 across 5 test files) + 6 instrumented tests (I1-I6). Tests not runnable locally (non-ASCII path + Windows AGP limitation, inherited from Story 8.1)."
  - "IInventoryRepository also exposes getSessionDetail() — not explicitly required in the interface spec but correct and useful for detail screen offline fallback."

tech_debt:
  - id: QA-8.4-TD-001
    description: >
      InventoryViewModel.loadSessions() offline path makes a recursive second call to
      getSessions() instead of querying Room cache directly via a dedicated method.
      When offline, the sessions list screen shows the offline banner but the list
      may be empty even if Room has cached data. Pattern is analogous to QA-8.3-001
      but for the sessions list screen. Add IInventoryRepository.getSessionsFromCache()
      and call it in the NetworkError branch, or refactor getSessions() to return
      ApiResult.Success(cached, isOffline=true) on network failure.
    priority: low

  - id: QA-8.4-TD-002
    description: >
      InventorySyncWorker inherits the double-retry pattern from PickingSyncWorker
      (QA-8.3-TD-002). Returning Result.retry() when hasFailure=true causes WorkManager
      to schedule additional exponential backoff retries on top of the manual retryCount
      mechanism. Change to Result.success() unconditionally and rely solely on on-demand
      enqueue with manual retry counter.
    priority: low

  - id: QA-8.4-TD-003
    description: >
      Inherited from Story 8.3 (QA-8.3-TD-004): ProGuard rules for Gson-serialized
      DTOs (CountItemRequestDto, DoubleCountRequestDto, CreateTransferRequestDto,
      InventoryItemDto, InventorySessionDto, TransferDto) have not been verified.
      Release builds may silently break serialization without explicit keep rules in
      proguard-rules.pro.
    priority: low
