name: CD — WMS Web

on:
  workflow_run:
    workflows: ["CI — WMS Web"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/odin-wms-web

jobs:
  deploy:
    name: Build · Push · Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/wms-web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            WMS_API_URL=${{ vars.WMS_API_URL || 'http://wms-service:8080' }}
            NEXT_PUBLIC_KEYCLOAK_URL=${{ vars.NEXT_PUBLIC_KEYCLOAK_URL || 'http://localhost:8180' }}
            NEXT_PUBLIC_KEYCLOAK_REALM=${{ vars.NEXT_PUBLIC_KEYCLOAK_REALM || 'odin' }}
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=${{ vars.NEXT_PUBLIC_KEYCLOAK_CLIENT_ID || 'wms-web' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to Kubernetes ───────────────────────────────────────────────────
      # Requires KUBECONFIG secret configured in repository settings.
      # For kind local: export KUBECONFIG and add as GitHub Secret.
      # Skip this step if KUBECONFIG is not configured.
      - name: Deploy to Kubernetes
        if: ${{ secrets.KUBECONFIG != '' }}
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          kubectl set image deployment/wms-web \
            wms-web=$IMAGE \
            --namespace=wms

          kubectl rollout status deployment/wms-web \
            --namespace=wms \
            --timeout=120s

          rm -f /tmp/kubeconfig
          echo "Deployed $IMAGE to Kubernetes ✅"
