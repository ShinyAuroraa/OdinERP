spring:
  application:
    name: odin-crm-backend
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:odin_crm}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: OdinCrmHikariPool
  jpa:
    open-in-view: false          # prevents N+1 via lazy loading across request boundary
    hibernate:
      ddl-auto: validate         # Flyway manages schema — JPA only validates
  flyway:
    enabled: true
    locations: classpath:db/migration

keycloak:
  admin:
    url: ${KEYCLOAK_URL:http://localhost:8180}
    realm: odin-crm
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:odin-crm-backend}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        liveness:
          include: livenessState      # JVM alive
        readiness:
          include: readinessState,db,redis  # infra dependencies (kafka has no health indicator in SB 3.3)
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    redis:
      enabled: true
