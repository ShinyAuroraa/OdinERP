apiVersion: v1
kind: ConfigMap
metadata:
  name: odin-crm-backend-config
  labels:
    {{- include "odin-crm-backend.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  KEYCLOAK_ISSUER_URI: "https://keycloak.odin.internal/realms/odin"
  SERVER_PORT: "8080"
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.name | quote }}
  SPRING_DATASOURCE_USERNAME: "odin_crm"
